 hoi4pc_desc.GER: "最终的胜利。"
 hoi4pc_desc.RSI: "领袖最后的豪赌到此结束。"
 hoi4pc_desc.ITA: "条条大路通罗马，皆由鲜血铺就。"
 hoi4pc_desc.ENG: "大英帝国终迎日落。"
 hoi4pc_desc.FRA: "自由、平等、博爱——抑或死亡。"
 hoi4pc_desc.SOV: "绝不后退一步。"
 hoi4pc_desc.HOL: "能拒沧海，难防人祸。"
 hoi4pc_desc.BEL_GER: "穿越阿登的道路已经敞开。"
 hoi4pc_desc.BEL: "比利时人民再次陷入黑暗。"
 hoi4pc_desc.LUX: "国小地狭，无处藏身。"
 hoi4pc_desc.SWI: "恪守中立未能护佑瑞士。"
 hoi4pc_desc.POL: "波兰尚未灭亡……直到如今。"
 hoi4pc_desc.DEN_GER: "六个小时。"
 hoi4pc_desc.DEN: "哥本哈根陷入沉寂。"
 hoi4pc_desc.NOR: "就连北极光也已黯淡。"
 hoi4pc_desc.SPA: "为了上帝，为了西班牙！"
 hoi4pc_desc.SPB: "这面古老的战旗被最后一次收起。"
 hoi4pc_desc.SPC: "既无神明，亦无主上，也无希望。"
 hoi4pc_desc.SPD: "他们休想通过！"
 hoi4pc_desc.GRE: "“来啊，有种就来拿！”"
 hoi4pc_desc.TUR: "博斯普鲁斯海峡的大门已然敞开。"
 hoi4pc_desc.FIN: "风雪覆残躯。"
 hoi4pc_desc.IRE: "而其魂梦所及，仍为家国统一。"
 hoi4pc_desc.YUG: "唯有冢墓，尚系统一。"
 hoi4pc_desc.HUN: "多瑙河上又奏起一首安魂曲。"
 hoi4pc_desc.ROM: "瓦拉几亚的森林笼罩着他们的坟墓。"
 hoi4pc_desc.TAN: "唐努什么？"
 hoi4pc_desc.MON: "大草原迎来了新主人。"
 hoi4pc_desc.JAP: "旭日已遭蚀没。"
 hoi4pc_desc.MAN: "天命从未眷顾于他。"
 hoi4pc_desc.CHI: "滚滚长江东逝水，浪花淘尽英雄。"
 hoi4pc_desc.PRC: "于是他们再度踏上征途，一去不返。"
 hoi4pc_desc.RAJ_dominion: "明珠碎裂。"
 hoi4pc_desc.RAJ_free: "印度人民尝到了自由的滋味，但这不过是昙花一现。"
 hoi4pc_desc.AST: "当你涉过那片水塘，或许仍能听见他孤魂的哀鸣。"
 hoi4pc_desc.NZL: "澳新军团永远铭记于心。"
 hoi4pc_desc.MAL: "季风与丛林未能阻挡他们的脚步。"
 hoi4pc_desc.PHI: "群岛陷入沉寂。"
 hoi4pc_desc.INS: "东印度群岛迎来了新主人。"
 hoi4pc_desc.ETH: "非洲的自由之光明灭不定，转瞬即逝。"
 hoi4pc_desc.USA: "而世界应为他的脚凳，光阴之魂亦为其奴仆。"
 hoi4pc_desc.CAN: "从维米岭的辉煌，到如今这般境地。"
 hoi4pc_desc.MEX: "离上帝太远，离死亡太近。"
 hoi4pc_desc.default: "战争即地狱。"
